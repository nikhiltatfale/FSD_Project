<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Manager - Dark Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📝 Notes Manager</h2>
            <button class="toggle-btn" id="toggleSidebar">☰</button>
        </div>

        <!-- Statistics -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-label">Total Notes</div>
                    <div class="stat-value" id="totalNotes">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📌</div>
                <div class="stat-info">
                    <div class="stat-label">Pinned</div>
                    <div class="stat-value" id="pinnedNotes">0</div>
                </div>
            </div>
        </div>

        <!-- Navigation Menu -->
        <nav class="nav-menu">
            <h3>Navigation</h3>
            <button class="nav-item active" data-view="all" onclick="changeView('all')">
                <span class="nav-icon">📋</span>
                <span class="nav-text">All Notes</span>
            </button>
            <button class="nav-item" data-view="favorites" onclick="changeView('favorites')">
                <span class="nav-icon">⭐</span>
                <span class="nav-text">Favorites</span>
            </button>
            <button class="nav-item" data-view="archived" onclick="changeView('archived')">
                <span class="nav-icon">📦</span>
                <span class="nav-text">Archived</span>
            </button>
        </nav>

        <!-- Categories -->
        <div class="category-section">
            <h3>Categories</h3>
            <button class="category-item" data-category="all" onclick="filterByCategory('all')">
                <span class="category-color all-color"></span>
                <span class="category-name">All</span>
                <span class="category-count" id="count-all">0</span>
            </button>
            <button class="category-item" data-category="work" onclick="filterByCategory('work')">
                <span class="category-color work-color"></span>
                <span class="category-name">Work</span>
                <span class="category-count" id="count-work">0</span>
            </button>
            <button class="category-item" data-category="personal" onclick="filterByCategory('personal')">
                <span class="category-color personal-color"></span>
                <span class="category-name">Personal</span>
                <span class="category-count" id="count-personal">0</span>
            </button>
            <button class="category-item" data-category="ideas" onclick="filterByCategory('ideas')">
                <span class="category-color ideas-color"></span>
                <span class="category-name">Ideas</span>
                <span class="category-count" id="count-ideas">0</span>
            </button>
            <button class="category-item" data-category="todo" onclick="filterByCategory('todo')">
                <span class="category-color todo-color"></span>
                <span class="category-name">To-Do</span>
                <span class="category-count" id="count-todo">0</span>
            </button>
        </div>

        <!-- Actions -->
        <div class="sidebar-actions">
            <button class="action-btn" id="newNoteBtn" onclick="scrollToForm()">
                <span>➕</span> New Note
            </button>
            <button class="action-btn" id="exportBtn" onclick="exportNotes()">
                <span>📥</span> Export
            </button>
            <button class="action-btn" id="importBtn" onclick="document.getElementById('importFile').click()">
                <span>📤</span> Import
            </button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importNotes(event)">
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="mobile-toggle" id="mobileToggle">☰</button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Search notes..." class="search-input">
            </div>
            <div class="top-actions">
                <select id="sortBy" class="sort-select">
                    <option value="newest">⬇️ Newest First</option>
                    <option value="oldest">⬆️ Oldest First</option>
                    <option value="title">🔤 Title (A-Z)</option>
                    <option value="modified">🕐 Recently Modified</option>
                </select>
                <button class="view-toggle" id="viewToggle" onclick="toggleView()">
                    <span id="viewIcon">📱</span>
                </button>
            </div>
        </div>

        <!-- Add/Edit Note Form -->
        <div class="note-form-container" id="noteFormContainer">
            <div class="form-header">
                <h2 id="formTitle">✨ Create New Note</h2>
                <button class="close-form" id="closeForm" onclick="resetForm()">✕</button>
            </div>
            
            <form id="noteForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="noteTitle">Title</label>
                        <input type="text" id="noteTitle" placeholder="Enter note title..." required>
                    </div>

                    <div class="form-group full-width">
                        <label for="noteContent">Content</label>
                        <textarea id="noteContent" placeholder="Write your note here..." required></textarea>
                        <div class="char-count">
                            <span id="charCount">0</span> / <span id="wordCount">0</span> words
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="noteCategory">Category</label>
                        <select id="noteCategory" required>
                            <option value="">Select Category</option>
                            <option value="work">💼 Work</option>
                            <option value="personal">👤 Personal</option>
                            <option value="ideas">💡 Ideas</option>
                            <option value="todo">✅ To-Do</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="notePriority">Priority</label>
                        <select id="notePriority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="noteTags">Tags (comma separated)</label>
                        <input type="text" id="noteTags" placeholder="tag1, tag2, tag3...">
                    </div>

                    <div class="form-group full-width">
                        <label for="noteColor">Note Color</label>
                        <div class="color-picker">
                            <input type="radio" name="noteColor" value="#1e293b" id="color1" checked>
                            <label for="color1" style="background: #1e293b;"></label>
                            
                            <input type="radio" name="noteColor" value="#1e3a8a" id="color2">
                            <label for="color2" style="background: #1e3a8a;"></label>
                            
                            <input type="radio" name="noteColor" value="#166534" id="color3">
                            <label for="color3" style="background: #166534;"></label>
                            
                            <input type="radio" name="noteColor" value="#854d0e" id="color4">
                            <label for="color4" style="background: #854d0e;"></label>
                            
                            <input type="radio" name="noteColor" value="#7c2d12" id="color5">
                            <label for="color5" style="background: #7c2d12;"></label>
                            
                            <input type="radio" name="noteColor" value="#701a75" id="color6">
                            <label for="color6" style="background: #701a75;"></label>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span>➕</span> Add Note
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="resetForm()">
                        <span>✕</span> Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Notes Display -->
        <div class="notes-container">
            <div class="notes-header">
                <h2 id="viewTitle">All Notes</h2>
                <span class="notes-count" id="displayCount">0 notes</span>
            </div>

            <div id="notesGrid" class="notes-grid">
                <!-- Notes will be dynamically added here -->
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <h3>No notes yet</h3>
                <p>Create your first note to get started!</p>
                <button class="btn btn-primary" onclick="scrollToForm()">Create Note</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🗑️</div>
            <h3>Delete Note?</h3>
            <p>This action cannot be undone. Are you sure?</p>
            <div class="modal-actions">
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
