<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1>🖼️ Image Gallery</h1>
    <span id="totalCount">0 images</span>
  </header>

  <!-- ── Upload Form ── -->
  <section class="upload-section">
    <h2>Upload Image</h2>
    <form id="uploadForm">
      <div class="form-row">
        <input type="text" id="title" placeholder="Title *" required />
        <select id="category" required>
          <option value="">Category *</option>
          <option value="Nature">Nature</option>
          <option value="Architecture">Architecture</option>
          <option value="People">People</option>
          <option value="Animals">Animals</option>
          <option value="Technology">Technology</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <textarea id="description" placeholder="Description (optional)" rows="2"></textarea>
      <div class="file-row">
        <input type="file" id="imageFile" accept="image/*" required />
        <button type="submit" id="uploadBtn">Upload</button>
      </div>
      <div id="uploadStatus"></div>
    </form>
  </section>

  <!-- ── Controls ── -->
  <section class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Search by title…" />
    <select id="filterCategory">
      <option value="">All Categories</option>
      <option value="Nature">Nature</option>
      <option value="Architecture">Architecture</option>
      <option value="People">People</option>
      <option value="Animals">Animals</option>
      <option value="Technology">Technology</option>
      <option value="Food">Food</option>
      <option value="Travel">Travel</option>
      <option value="Other">Other</option>
    </select>
    <select id="sortOrder">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </section>

  <!-- ── Gallery ── -->
  <main id="gallery" class="gallery">
    <p class="empty-msg" id="emptyMsg">No images yet. Upload one above!</p>
  </main>

  <!-- ── Modal ── -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <img id="modalImg" src="" alt="" />
      <div class="modal-info">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <div class="modal-meta">
          <span id="modalCategory"></span>
          <span id="modalDate"></span>
        </div>
        <div class="modal-actions">
          <button id="modalDownload">⬇ Download</button>
          <button id="modalDelete" class="danger">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
