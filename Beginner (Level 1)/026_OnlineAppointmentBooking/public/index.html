<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointment Booking</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- BOOKING SECTION -->
  <div id="bookingSection" class="card">
    <h1>Book an Appointment</h1>
    <p class="sub">Fill in the details below to reserve your slot.</p>

    <form id="bookingForm">
      <div class="row2">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="john@email.com" required/>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 9876543210" required/>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="date" required/>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Time Slot</label>
          <select id="time" required></select>
        </div>
        <div class="field">
          <label>Reason</label>
          <input type="text" id="reason" placeholder="Consultation, Follow-up..." required/>
        </div>
      </div>
      <button type="submit" class="btn">Book Appointment</button>
      <div id="bookMsg" class="msg"></div>
    </form>
  </div>

  <!-- ADMIN LOGIN SECTION -->
  <div id="adminLoginSection" class="card hidden">
    <h2>Admin Login</h2>
    <div class="field">
      <label>Username</label>
      <input type="text" id="adminUser" placeholder="admin"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="adminLogin()">Login</button>
    <button class="btn btn-outline" onclick="showSection('booking')">Cancel</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDashboard" class="card hidden">
    <div class="dash-header">
      <h2>Admin Dashboard</h2>
      <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
    </div>
    <p id="apptCount" class="sub"></p>
    <div class="table-wrap">
      <table id="apptTable">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Email</th><th>Phone</th>
            <th>Date</th><th>Time</th><th>Reason</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="apptBody"></tbody>
      </table>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; 2025 Appointment System &nbsp;|&nbsp;
    <a href="#" onclick="showSection('adminLogin'); return false;">Admin</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
