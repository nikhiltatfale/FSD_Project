<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">TaskFlow</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-pending">0</span>
          <span class="stat-label">Pending</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main-layout">

    <!-- Sidebar / Form Panel -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">New Task</h2>
        <button class="btn-collapse" id="toggle-form" aria-label="Toggle form">−</button>
      </div>

      <form id="task-form" class="task-form">
        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="What needs to be done?" autocomplete="off" required />
        </div>

        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" placeholder="Add details…" rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-due">Due Date</label>
            <input type="date" id="task-due" />
          </div>
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="task-category">Category / Tag</label>
          <input type="text" id="task-category" placeholder="e.g. Design, Work, Personal" autocomplete="off" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span class="btn-icon">+</span> Add Task
          </button>
          <button type="button" class="btn btn-ghost" id="cancel-edit-btn" style="display:none;">
            Cancel
          </button>
        </div>
      </form>
    </aside>

    <!-- Main Content -->
    <section class="content">

      <!-- Controls -->
      <div class="controls">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" placeholder="Search tasks…" autocomplete="off" />
          <button class="clear-search" id="clear-search" style="display:none;" title="Clear search">✕</button>
        </div>

        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="pending">Pending</button>
          <button class="filter-tab" data-filter="completed">Completed</button>
          <button class="filter-tab" data-filter="high">High Priority</button>
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list">
        <!-- Tasks injected here -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">◎</div>
        <p class="empty-title">No tasks found</p>
        <p class="empty-sub">Add a new task or try a different filter.</p>
      </div>

    </section>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Task</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="edit-form" class="task-form">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Title <span class="required">*</span></label>
          <input type="text" id="edit-title" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="edit-desc" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="edit-due" />
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="edit-priority">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Category / Tag</label>
          <input type="text" id="edit-category" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
