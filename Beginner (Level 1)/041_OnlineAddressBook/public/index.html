<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Address Book</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>📒 Online Address Book</h1>
  </header>

  <main>
    <section id="form-section">
      <h2 id="form-title">Add New Contact</h2>
      <form id="contact-form" novalidate>
        <input type="hidden" id="edit-id"/>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" placeholder="John Doe" required/>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="text" id="phone" placeholder="+91 9876543210" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="john@example.com" required/>
          </div>
          <div class="form-group">
            <label for="address">Address *</label>
            <input type="text" id="address" placeholder="123 Main St, City" required/>
          </div>
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Optional notes..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Contact</button>
          <button type="button" id="cancel-btn" style="display:none">Cancel</button>
        </div>
      </form>
    </section>

    <section id="contacts-section">
      <div class="contacts-header">
        <h2>Contacts (<span id="contact-count">0</span>)</h2>
        <input type="text" id="search" placeholder="🔍 Search by name, email, phone..."/>
      </div>
      <div id="loading" style="display:none">Loading...</div>
      <div id="contacts-list"></div>
      <div id="empty-state" style="display:none">
        <p>No contacts found. Add your first contact above!</p>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="script.js"></script>
</body>
</html>
