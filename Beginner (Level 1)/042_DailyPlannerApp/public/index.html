<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Planner</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Name Modal -->
<div id="nameModal" class="modal-overlay">
  <div class="modal-box">
    <h2>Welcome to Daily Planner</h2>
    <p>Enter your name to get started</p>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="50"/>
    <button id="nameSubmitBtn">Get Started</button>
    <p id="nameError" class="error-text"></p>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="adminModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <input type="text" id="adminUser" placeholder="Username"/>
    <input type="password" id="adminPass" placeholder="Password"/>
    <button id="adminLoginBtn">Login</button>
    <button id="adminModalClose" class="btn-secondary">Cancel</button>
    <p id="adminError" class="error-text"></p>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden">
  <header>
    <div class="header-left">
      <h1>📅 Daily Planner</h1>
      <span id="greetUser"></span>
    </div>
    <div class="header-right">
      <input type="date" id="datePicker"/>
      <button id="adminAccessBtn" title="Admin">🔐</button>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-info">
      <span id="progressLabel">Progress: 0%</span>
      <span id="taskCount">0 tasks</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Task Form -->
  <div class="form-section">
    <h3 id="formTitle">Add New Task</h3>
    <div class="form-grid">
      <input type="text" id="taskTitle" placeholder="Task title *"/>
      <input type="text" id="taskDesc" placeholder="Description"/>
      <input type="time" id="taskTime"/>
      <select id="taskPriority">
        <option value="Low">Low Priority</option>
        <option value="Medium">Medium Priority</option>
        <option value="High">High Priority</option>
      </select>
    </div>
    <div class="form-actions">
      <button id="addTaskBtn">Add Task</button>
      <button id="cancelEditBtn" class="btn-secondary hidden">Cancel</button>
    </div>
    <p id="taskError" class="error-text"></p>
  </div>

  <!-- Filters -->
  <div class="filter-section">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <!-- Task List -->
  <div id="taskList" class="task-list"></div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" class="hidden">
  <header>
    <div class="header-left"><h1>🛡️ Admin Panel</h1></div>
    <div class="header-right">
      <button id="adminLogoutBtn" class="btn-secondary">Logout</button>
    </div>
  </header>

  <div class="admin-stats" id="adminStats"></div>

  <div class="admin-section">
    <h3>All Users</h3>
    <div id="adminUsers"></div>
  </div>

  <div class="admin-section">
    <h3>All Tasks</h3>
    <div class="admin-filter-row">
      <input type="text" id="adminFilterUser" placeholder="Filter by user"/>
      <input type="date" id="adminFilterDate"/>
      <button id="adminFilterBtn">Filter</button>
      <button id="adminFilterClear" class="btn-secondary">Clear</button>
    </div>
    <div id="adminTasks"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
