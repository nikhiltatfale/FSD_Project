<body>
<nav>
  <span class="brand">Grand Stay</span>
  <a href="index.html">Home</a>

<div class="hero">
  <h1>Welcome to Grand Stay</h1>
  <p>Luxury rooms at unbeatable prices. Check availability and book instantly.</p>
</div>
<div class="container">
  <h2>Check Availability</h2>
  <form action="rooms.html" method="get" style="background:#fff;padding:24px;border:1px solid #ddd;max-width:480px;border-radius:4px">
    <label>Check-In Date</label>
    <input type="date" name="checkIn" required>
    <label>Check-Out Date</label>
    <input type="date" name="checkOut" required>
    <button type="submit" class="btn btn-gold">Search Rooms</button>
  </form>
</div>
