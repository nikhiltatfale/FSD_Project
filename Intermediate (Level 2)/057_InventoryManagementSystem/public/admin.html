<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IMS - Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>▣ IMS — ADMIN PANEL</h1>
  <a href="index.html">← USER VIEW</a>
</header>
<div class="container">
  <div id="admin-msg" class="msg"></div>
  <div class="grid">
    <div class="card">
      <h2>ADD PRODUCT</h2>
      <form id="add-form">
        <input id="a-name" placeholder="Product Name" required>
        <input id="a-category" placeholder="Category" required>
        <input id="a-price" type="number" placeholder="Price (₹)" min="0" required>
        <input id="a-quantity" type="number" placeholder="Initial Quantity" min="0" required>
        <button class="btn btn-green" type="submit">+ ADD PRODUCT</button>
      </form>
    </div>
    <div class="card">
      <h2>QUICK STATS</h2>
      <p style="color:#555;font-size:.82rem;margin-top:8px">Products and log summary visible in tables below.</p>
    </div>
  </div>

  <div class="section">
    <h2>ALL PRODUCTS</h2>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Last Updated</th><th>Actions</th></tr></thead>
      <tbody id="admin-table"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>INVENTORY LOGS</h2>
    <table>
      <thead><tr><th>Product</th><th>Action</th><th>Quantity</th><th>Date</th></tr></thead>
      <tbody id="logs-table"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3>EDIT PRODUCT</h3>
    <input id="e-name" placeholder="Name" style="margin-bottom:8px;display:block;width:100%;background:#0f0f0f;border:1px solid #333;color:#e0e0e0;padding:8px;font-family:inherit">
    <input id="e-category" placeholder="Category" style="margin-bottom:8px;display:block;width:100%;background:#0f0f0f;border:1px solid #333;color:#e0e0e0;padding:8px;font-family:inherit">
    <input id="e-price" type="number" placeholder="Price" style="margin-bottom:8px;display:block;width:100%;background:#0f0f0f;border:1px solid #333;color:#e0e0e0;padding:8px;font-family:inherit">
    <input id="e-quantity" type="number" placeholder="Quantity" style="margin-bottom:8px;display:block;width:100%;background:#0f0f0f;border:1px solid #333;color:#e0e0e0;padding:8px;font-family:inherit">
    <div class="modal-btns">
      <button class="btn btn-green" id="edit-save">SAVE</button>
      <button class="btn btn-red" id="edit-cancel">CANCEL</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>initAdmin();</script>
</body>
</html>
