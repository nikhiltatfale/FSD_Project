<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CourseHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-top">
    <h1>CourseHub</h1>
    <button id="adminToggleBtn" onclick="toggleAdminMode()">Admin Mode</button>
  </div>
  <div class="header-controls">
    <input type="text" id="searchInput" placeholder="Search courses..." oninput="searchCourses()">
    <select id="categoryFilter" onchange="filterByCategory()">
      <option value="">All Categories</option>
      <option value="Web Dev">Web Dev</option>
      <option value="Data Science">Data Science</option>
      <option value="Design">Design</option>
      <option value="Marketing">Marketing</option>
      <option value="Business">Business</option>
    </select>
    <button onclick="showEnrollments()">My Enrollments</button>
  </div>
</header>

<main>
  <section id="courseListSection">
    <h2>All Courses</h2>
    <div id="courseGrid"></div>
  </section>

  <section id="detailsSection" style="display:none">
    <button onclick="closeDetails()">&#8592; Back</button>
    <div id="courseDetails"></div>
  </section>

  <section id="enrollmentsSection" style="display:none">
    <button onclick="closeEnrollments()">&#8592; Back</button>
    <h2>My Enrollments</h2>
    <div id="enrolledList"></div>
  </section>

  <section id="adminSection" style="display:none">
    <h2>Admin Panel</h2>
    <div class="admin-form">
      <h3 id="formTitle">Add Course</h3>
      <input type="hidden" id="editId">
      <input type="text" id="fTitle" placeholder="Title" required>
      <input type="text" id="fInstructor" placeholder="Instructor" required>
      <select id="fCategory">
        <option value="Web Dev">Web Dev</option>
        <option value="Data Science">Data Science</option>
        <option value="Design">Design</option>
        <option value="Marketing">Marketing</option>
        <option value="Business">Business</option>
      </select>
      <input type="number" id="fPrice" placeholder="Price (₹)" required>
      <textarea id="fDesc" placeholder="Description" rows="3"></textarea>
      <div class="form-btns">
        <button onclick="saveCourse()">Save</button>
        <button onclick="resetForm()">Cancel</button>
      </div>
    </div>
    <h3>Manage Courses</h3>
    <div id="adminCourseList"></div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
