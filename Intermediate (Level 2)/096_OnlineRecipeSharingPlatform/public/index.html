<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>RecipeShare</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"></head><body>
<nav><span class="logo">🍴 RecipeShare</span><div class="nav-links"><span id="nav-user"></span><button id="btn-nav-recipes" class="nav-btn" onclick="showSection('recipes')">Recipes</button><button id="btn-nav-add" class="nav-btn hidden" onclick="showSection('add')">+ Add</button><button id="btn-nav-admin" class="nav-btn hidden" onclick="showSection('admin')">Dashboard</button><button id="btn-logout" class="nav-btn hidden" onclick="logout()">Logout</button><button id="btn-nav-login" class="nav-btn accent" onclick="showSection('auth')">Login</button></div></nav>
<main>
<section id="sec-auth"><div class="card auth-card"><div class="tabs"><button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button><button class="tab" id="tab-reg" onclick="switchTab('register')">Register</button></div><div id="form-login"><input type="text" id="login-user" placeholder="Username"><input type="password" id="login-pass" placeholder="Password"><button onclick="login()">Login</button><p class="small">Admin? <a href="#" onclick="switchTab('admin-login')">Admin Login</a></p></div><div id="form-register" class="hidden"><input type="text" id="reg-user" placeholder="Username"><input type="password" id="reg-pass" placeholder="Password"><button onclick="register()">Register</button></div><div id="form-admin-login" class="hidden"><input type="text" id="admin-user" placeholder="Admin Username"><input type="password" id="admin-pass" placeholder="Admin Password"><button onclick="adminLogin()">Admin Login</button></div><p id="auth-msg" class="msg"></p></div></section>
<section id="sec-recipes" class="hidden"><div class="search-bar"><input type="text" id="search" placeholder="Search recipes..." oninput="filterRecipes()"><span>🔍</span></div><div id="recipe-grid"></div></section>
<section id="sec-add" class="hidden"><div class="card add-card"><h2>New Recipe</h2><input type="text" id="recipe-title" placeholder="Recipe Title"><textarea id="recipe-ingredients" placeholder="Ingredients (one per line)" rows="5"></textarea><textarea id="recipe-steps" placeholder="Steps" rows="6"></textarea><button onclick="addRecipe()">Publish Recipe</button><p id="add-msg" class="msg"></p></div></section>
<section id="sec-admin" class="hidden"><h2>Admin Dashboard</h2><div class="admin-grid"><div class="card"><h3>All Recipes</h3><div id="admin-recipes"></div></div><div class="card"><h3>All Users</h3><div id="admin-users"></div></div></div></section>
</main>
<script src="script.js"></script></body></html>
